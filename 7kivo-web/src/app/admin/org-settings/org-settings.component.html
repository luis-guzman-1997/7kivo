<div class="settings-page">
  <div class="page-header">
    <div>
      <h1 class="page-title"><i class="fas fa-building"></i> Mi Empresa</h1>
      <p class="page-subtitle">Datos y configuración de tu organización</p>
    </div>
  </div>

  <div class="toast toast-success" *ngIf="notice"><i class="fas fa-check-circle"></i> {{ notice }}</div>
  <div class="toast toast-error" *ngIf="error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>

  <div *ngIf="loading" class="loading-state">
    <i class="fas fa-spinner fa-spin"></i> Cargando configuración...
  </div>

  <div *ngIf="!loading" class="tab-content">
    <!-- Org Details Card -->
    <div class="config-card">
      <div class="card-header">
        <div class="card-icon blue"><i class="fas fa-building"></i></div>
        <div>
          <h3>Datos de la Organización</h3>
          <p>Información general de tu empresa</p>
        </div>
      </div>
      <div class="config-form">
        <!-- Logo Upload -->
        <div class="logo-upload-section">
          <label class="form-label-top">Logo de la empresa</label>
          <div class="logo-upload-row">
            <div class="logo-preview-box" [class.has-logo]="logoPreview">
              <img *ngIf="logoPreview" [src]="logoPreview" alt="Logo" />
              <i *ngIf="!logoPreview" class="fas fa-image"></i>
            </div>
            <div class="logo-upload-actions">
              <label class="btn-upload">
                <i class="fas fa-upload"></i> {{ logoPreview ? 'Cambiar logo' : 'Subir logo' }}
                <input type="file" accept="image/*" (change)="onLogoSelected($event)" hidden />
              </label>
              <button class="btn-remove-logo" *ngIf="logoPreview" (click)="removeLogo()">
                <i class="fas fa-trash"></i> Quitar
              </button>
              <span class="logo-hint">PNG, JPG o WebP. Máximo 2 MB.</span>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Nombre de la Organización</label>
            <input type="text" [(ngModel)]="generalConfig.orgName" placeholder="Mi Empresa" />
          </div>
          <div class="form-group">
            <label>Industria / Rubro</label>
            <select [(ngModel)]="generalConfig.industry">
              <option value="general">General</option>
              <option value="education">Educación</option>
              <option value="healthcare">Salud</option>
              <option value="retail">Comercio / Retail</option>
              <option value="services">Servicios</option>
              <option value="restaurant">Restaurante / Comida</option>
              <option value="realestate">Bienes Raíces</option>
              <option value="technology">Tecnología</option>
              <option value="other">Otro</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Descripción</label>
          <textarea [(ngModel)]="generalConfig.description" rows="3" placeholder="Breve descripción de tu organización"></textarea>
        </div>
        <div class="form-group">
          <label>WhatsApp Personal (fallback 24h)</label>
          <div class="input-with-icon">
            <i class="fab fa-whatsapp"></i>
            <input type="text" [(ngModel)]="generalConfig.personalWhatsApp" placeholder="503XXXXXXXX" />
          </div>
          <span class="hint">Se usa cuando expira la ventana de 24h para contactar al usuario</span>
        </div>
        <button class="btn-save" (click)="saveGeneral()" [disabled]="saving">
          <i class="fas" [class.fa-save]="!saving" [class.fa-spinner]="saving" [class.fa-spin]="saving"></i>
          {{ saving ? 'Guardando...' : 'Guardar' }}
        </button>
      </div>
    </div>
  </div>
</div>
