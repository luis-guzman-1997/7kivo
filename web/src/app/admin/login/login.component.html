<div class="login-page">
  <div class="login-card" *ngIf="!showRegister">
    <div class="login-header">
      <div class="login-icon">
        <i class="fas fa-shield-alt"></i>
      </div>
      <h2>Panel de Administración</h2>
      <p>Inicia sesión para gestionar tu organización</p>
    </div>

    <form (ngSubmit)="onLogin()" class="login-form">
      <div class="form-group-login">
        <label for="email">
          <i class="fas fa-envelope"></i> Correo electrónico
        </label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="admin@ejemplo.com"
          autocomplete="email"
        />
      </div>

      <div class="form-group-login">
        <label for="password">
          <i class="fas fa-lock"></i> Contraseña
        </label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      <div class="error-message" *ngIf="error">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
      </div>

      <button type="submit" class="btn-login" [disabled]="loading">
        <span *ngIf="!loading">
          <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
        </span>
        <span *ngIf="loading">
          <i class="fas fa-spinner fa-spin"></i> Ingresando...
        </span>
      </button>
    </form>

    <div class="login-divider">
      <span>o</span>
    </div>

    <button class="btn-register-toggle" (click)="showRegister = true">
      <i class="fas fa-building"></i> Crear nueva organización
    </button>

    <div class="login-footer">
      <a routerLink="/">
        <i class="fas fa-arrow-left"></i> Volver al sitio
      </a>
    </div>
  </div>

  <!-- REGISTER FORM -->
  <div class="login-card register-card" *ngIf="showRegister">
    <div class="login-header">
      <div class="login-icon">
        <i class="fas fa-building"></i>
      </div>
      <h2>Crear Organización</h2>
      <p>Registra tu empresa y configura tu bot de WhatsApp</p>
    </div>

    <form (ngSubmit)="onRegister()" class="login-form">
      <div class="form-group-login">
        <label><i class="fas fa-building"></i> Nombre de la organización</label>
        <input type="text" [(ngModel)]="regOrgName" name="orgName" placeholder="Mi Empresa" />
      </div>

      <div class="form-group-login">
        <label><i class="fas fa-industry"></i> Rubro / Industria</label>
        <select [(ngModel)]="regIndustry" name="industry">
          <option value="general">General</option>
          <option value="education">Educación</option>
          <option value="healthcare">Salud</option>
          <option value="retail">Comercio / Retail</option>
          <option value="services">Servicios</option>
          <option value="restaurant">Restaurante / Comida</option>
          <option value="realestate">Bienes Raíces</option>
          <option value="technology">Tecnología</option>
          <option value="other">Otro</option>
        </select>
      </div>

      <div class="form-group-login">
        <label><i class="fas fa-align-left"></i> Descripción (opcional)</label>
        <input type="text" [(ngModel)]="regDescription" name="description" placeholder="Breve descripción de tu organización" />
      </div>

      <hr style="border: none; border-top: 1px solid #e0e0e0; margin: 16px 0;" />

      <div class="form-group-login">
        <label><i class="fas fa-user"></i> Tu nombre</label>
        <input type="text" [(ngModel)]="regAdminName" name="adminName" placeholder="Tu nombre completo" />
      </div>

      <div class="form-group-login">
        <label><i class="fas fa-envelope"></i> Correo electrónico</label>
        <input type="email" [(ngModel)]="regEmail" name="regEmail" placeholder="admin@ejemplo.com" autocomplete="email" />
      </div>

      <div class="form-group-login">
        <label><i class="fas fa-lock"></i> Contraseña</label>
        <input type="password" [(ngModel)]="regPassword" name="regPassword" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
      </div>

      <div class="error-message" *ngIf="error">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
      </div>

      <div class="success-message" *ngIf="success">
        <i class="fas fa-check-circle"></i> {{ success }}
      </div>

      <button type="submit" class="btn-login btn-create" [disabled]="loading">
        <span *ngIf="!loading">
          <i class="fas fa-rocket"></i> Crear Organización
        </span>
        <span *ngIf="loading">
          <i class="fas fa-spinner fa-spin"></i> Creando...
        </span>
      </button>
    </form>

    <div class="login-footer">
      <a (click)="showRegister = false; error = ''; success = ''" style="cursor: pointer;">
        <i class="fas fa-arrow-left"></i> Volver al inicio de sesión
      </a>
    </div>
  </div>
</div>
